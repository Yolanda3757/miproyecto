<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas</title>
    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="frontend/style.css">
</head>
<body>
    <div class="container">
        <h1>Gestor de Tareas</h1>
        <!--formulario de creación-->
        <form id="taskForm" class="form-card">
            <label for="titulo">Título de la tarea:</label>
            <input type="text" id="titulo" name="titulo" placeholder="Ej: Comprar leche" maxlength="80" required>

            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" name="descripcion" placeholder="Detalles de la tarea" maxlength="200"></textarea>

            <button type="submit">➕ Crear tarea</button>
        </form>
        <!-- Botón para listar -->
        <button id="listarBtn" class="task-btn">📋 Listar tareas</button>
        <!-- Lista de tareas -->
    
        <ul id="taskList" class="task-list"></ul>
    </div>

    <!-- Modal de edición -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3>Editar tarea</h3>
        <label for="editTitle">Título:</label>
        <input type="text" id="editTitle">
        <label for="editDescription">Descripción:</label>
        <textarea id="editDescription"></textarea>
        <div class="modal-buttons">
          <button id="saveEdit" class="task-btn edit-btn">Aceptar</button>
          <button id="cancelEdit" class="task-btn delete-btn">Cancelar</button>
        </div>
      </div>
    </div>
    <script src="frontend/index.js"></script>
</body>
</html>
